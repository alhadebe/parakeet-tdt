name: Auto-build Parakeet TDT

on:
  schedule:
    - cron: '0 * * * *' # Polls every hour
  workflow_dispatch:    # Allows manual triggering

env:
  REGISTRY: ghcr.io
  UPSTREAM_REPO: groxaxo/parakeet-tdt-0.6b-v3-fastapi-openai
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Needed to push to GHCR

    steps:
      - name: Set lower-case image name
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$OWNER_LC/parakeet-tdt" >> $GITHUB_ENV

      - name: Get latest commit from upstream main branch
        id: get_commit
        run: |
          # Fetch the latest commit SHA from the main branch
          LATEST_SHA=$(curl -sL https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/commits/main | jq -r .sha)
          if [ -z "$LATEST_SHA" ] || [ "$LATEST_SHA" == "null" ]; then
            echo "Error fetching the latest commit. (API rate limit or repo missing?)"
            exit 1
          fi
          
          # Grab the first 7 characters for a cleaner Docker tag
          SHORT_SHA=${LATEST_SHA:0:7}
          
          echo "Latest upstream commit is: $LATEST_SHA ($SHORT_SHA)"
          echo "LATEST_SHA=$LATEST_SHA" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image for this commit already exists
        id: check_image
        run: |
          # We just check if the CPU image with this commit hash exists. 
          # If it does, we assume both exist and we can skip the build.
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cpu-${{ env.SHORT_SHA }} > /dev/null 2>&1; then
            echo "Images for commit ${{ env.SHORT_SHA }} already exist in GHCR. Skipping build."
            echo "build_needed=false" >> $GITHUB_ENV
          else
            echo "Images for commit ${{ env.SHORT_SHA }} not found. Proceeding with build."
            echo "build_needed=true" >> $GITHUB_ENV
          fi

      - name: Checkout upstream code
        if: env.build_needed == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ env.LATEST_SHA }}
          
      - name: Patch upstream Dockerfile (Fix onnxruntime version)
        if: env.build_needed == 'true'
        run: |
          # The upstream repo hardcodes a non-existent onnxruntime==1.26.0 in the CPU Dockerfile.
          # This replaces it on-the-fly with a relaxed version constraint so it builds successfully.
          sed -i 's/onnxruntime==1.26.0/onnxruntime>=1.18.1/g' Dockerfile.cpu

          # 2. Force PyTorch to use CPU-only wheels. 
          # This prevents pip from downloading 3GB+ of useless NVIDIA CUDA binaries into the CPU image.
          sed -i 's|pip install --no-cache-dir -r|pip install --no-cache-dir --extra-index-url https://download.pytorch.org/whl/cpu -r|g' Dockerfile.cpu

      - name: Set up Docker Buildx
        if: env.build_needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push CPU image
        if: env.build_needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cpu-${{ env.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cpu-latest

      - name: Build and push GPU image
        if: env.build_needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.gpu
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:gpu-${{ env.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:gpu-latest
